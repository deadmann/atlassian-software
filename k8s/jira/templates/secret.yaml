apiVersion: v1
kind: Secret
namespace: {{ .Values.namespace }}
metadata:
  name: jira-db-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secret.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  POSTGRES_DB: jira
  ATL_JDBC_USER: {{ .Values.secret.postgresUser | quote }}
  ATL_JDBC_PASSWORD: {{ .Values.secret.postgresPassword | quote }}